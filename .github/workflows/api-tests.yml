name: API Tests and Deploy

on:
  push:
    branches: [ add-getscore-function, main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Даем разрешения для Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Разрешаем только один concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run API tests
        run: npm run test:api:ci

      - name: List files for debugging
        run: ls -la

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-report.html
            coverage/
          retention-days: 30
